            speakerName.textContent = 'Вы';
            
            if (printTimer) clearTimeout(printTimer);
            isPrinting = false;
            
            meetingDialogTexts = [
                'Ты неожиданно встречаешь росомаху! Не паникуй и помни, что знание алгоритма действий спасёт тебе жизнь.',
                'Первым делом о росомахе и её местоположении нужно сообщить соклановцам и Правому Альянсу: в общей и новостной беседах с тагом @all, а если ты в них не состоишь, то любому коту из Правого Альянса в сети.',
                'Посмотри на локацию и подумай, куда лучше будет уйти, чтобы спастись?'
            ];
            meetingDialogIndex = 0;
            
            printDialog(meetingDialogTexts[0], false);
        }

        function showChoicePanel() {
            choiceButtons.innerHTML = '';
            choicePanel.classList.add('visible');
            waitingForChoice = true;
            
            const choices = [
                'В глубокие воды',
                'Пойду на лазательные локации (Пологий склон)',
                'В Мёрзлые земли',
                'В горы через Ледопад',
                'На Перевал'
            ];
            
            choices.forEach(choice => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.textContent = choice;
                btn.addEventListener('click', () => {
                    playClickSound();
                    currentChoice = choice;
                    
                    const locationData = locationFeedback[currentLocation];
                    if (!locationData) {
                        return;
                    }
                    
                    currentChoiceData = locationData[choice];
                    if (!currentChoiceData) {
                        return;
                    }
                    
                    choicePanel.classList.remove('visible');
                    waitingForChoice = false;
                    
                    dialogPanel.classList.add('active');
                    speakerName.textContent = 'Вы';
                    
                    choiceComments = currentChoiceData.comments;
                    choiceCommentIndex = 0;
                    
                    printDialog(choiceComments[0], false);
                    
                    if (currentChoiceData.isCorrect) {
                        escapeAttempted = true;
                    }
                });
                choiceButtons.appendChild(btn);
            });
        }

        function resumeWolverineMovement() {
            if (!wolverineActive || !gameActive) return;
            
            wolverineMoving = false;
            wolverineMoveComplete = false;
            
            if (wolverineInterval) {
                clearInterval(wolverineInterval);
                wolverineInterval = null;
            }
            
            if (wolverineTimer) {
                clearInterval(wolverineTimer);
                wolverineTimer = null;
            }
            
            wolverineTargetTransition = null;
            
            updateArrowTarget();
            
            startWolverineBehavior();
            
            renderGrid();
        }

        function getArrowRotation(fromRow, fromCol, toRow, toCol) {
            if (toRow === undefined || toCol === undefined) return currentArrowAngle;
            
            const rowDiff = toRow - fromRow;
            const colDiff = toCol - fromCol;
            
            let angle = 0;
            
            if (rowDiff < 0 && colDiff === 0) angle = 90;
            else if (rowDiff < 0 && colDiff > 0) angle = 180;
            else if (rowDiff === 0 && colDiff > 0) angle = 90;
            else if (rowDiff > 0 && colDiff > 0) angle = 135;
            else if (rowDiff > 0 && colDiff === 0) angle = 180;
            else if (rowDiff > 0 && colDiff < 0) angle = 225;
            else if (rowDiff === 0 && colDiff < 0) angle = 360;
            else if (rowDiff < 0 && colDiff < 0) angle = 315;
            
            return angle;
        }
    
        function updateArrowTarget() {
            if (!wolverineActive) return;
            
            let targetRow = null;
            let targetCol = null;
            
            if (wolverineLocation === currentLocation) {
                targetRow = playerRow;
                targetCol = playerCol;
            } else if (wolverineTargetTransition) {
                targetRow = wolverineTargetTransition.row;
                targetCol = wolverineTargetTransition.col;
            } else {
                const location = locations[wolverineLocation];
                if (location && location.grid.transitions && location.grid.transitions.length > 0) {
                    const randomIndex = Math.floor(Math.random() * location.grid.transitions.length);
                    wolverineTargetTransition = {
                        ...location.grid.transitions[randomIndex],
                        location: wolverineLocation
                    };
                    targetRow = wolverineTargetTransition.row;
                    targetCol = wolverineTargetTransition.col;
                }
            }
            
            if (targetRow !== null && targetCol !== null) {
                targetArrowAngle = getArrowRotation(wolverineRow, wolverineCol, targetRow, targetCol);
            }
        }
    
        function animateArrow() {
            if (!wolverineActive) {
                arrowAnimationFrame = requestAnimationFrame(animateArrow);
                return;
            }

            if (wolverineMoving) {
                arrowAnimationFrame = requestAnimationFrame(animateArrow);
                return;
            }
            
            const diff = targetArrowAngle - currentArrowAngle;
            
            let normalizedDiff = diff;
            if (diff > 180) {
                normalizedDiff = diff - 360;
            } else if (diff < -180) {
                normalizedDiff = diff + 360;
            }
            
            if (Math.abs(normalizedDiff) > 0.5) {
                currentArrowAngle += normalizedDiff * 0.1;
            } else {
                currentArrowAngle = targetArrowAngle;
            }
            
            let displayAngle = currentArrowAngle;
            while (displayAngle < 0) displayAngle += 360;
            while (displayAngle >= 360) displayAngle -= 360;
            
            const arrowElement = document.getElementById('wolverine-arrow');
            if (arrowElement) {
                arrowElement.style.transform = `rotate(${displayAngle}deg)`;
            }
            
            arrowAnimationFrame = requestAnimationFrame(animateArrow);
        }
    
        function renderGrid() {
            const location = locations[currentLocation];
            if (!location) return;
            
            const grid = location.grid;
            let html = '';
            
            fieldTable.style.backgroundImage = `url('${location.fieldBackground}')`;
            
            for (let row = 0; row < grid.rows; row++) {
                html += '<tr>';
                for (let col = 0; col < grid.cols; col++) {
                    html += '<td>';
                    html += '<div class="cage_items">';
                    
                    const character = location.characters?.find(c => c.row === row && c.col === col);
                    if (character) {
                        let layersHtml = '';
                        character.layers.forEach(layer => {
                            layersHtml += `<div class="cat-layer" style="background-image: url('${layer}');"></div>`;
                        });
                        html += `<div class="other-cat">${layersHtml}</div>`;
                    }
                    
                    if (row === playerRow && col === playerCol) {
                        html += `<div class="cat-container">
                            <div class="cat-layer" style="background-image: url('https://allwebs.ru/images/2026/03/10/7457012d89a6c19187e4ac3ab256ebf6.png');"></div>
                        </div>`;
                    }
                    
                    if (wolverineActive && wolverineLocation === currentLocation && row === wolverineRow && col === wolverineCol) {
                        updateArrowTarget();
                        
                        html += `<span class="catWithArrow">`;
                        html += `<div style="position: relative; width: 100%; height: 100%;">`;
                        html += `<div class="arrow arrow-paws" id="wolverine-arrow" style="position: absolute; top: 60px; left: -20px; transform: rotate(${currentArrowAngle}deg); opacity: 1; transform-origin: center center;">`;
                        html += `<table style="width: 60px; margin: 0;">`;
                        html += `<tbody><tr>`;
                        html += `<td class="arrow_green" style="width: 60px;"></td>`;
                        html += `</tr></tbody></table>`;
                        html += `</div>`;
                        html += `<div class="wolverine" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;">`;
                        html += `<div class="cat-layer" style="background-size: 100%; background-image: url('https://allwebs.ru/images/2026/02/18/0c61a43ec0554805d67882a0b9231bc9.png'); position: absolute; top: 0; left: 0; width: 100%; height: 100%;"></div>`;
                        html += `</div></div></span>`;
                        
                        if (!arrowAnimationFrame) {
                            animateArrow();
                        }
                    }
                    
                    const transition = grid.transitions?.find(t => t.row === row && t.col === col);
                    if (transition) {
                        html += `
                            <span class="move_parent" data-type="transition" data-next="${transition.nextLocation}" data-row="${row}" data-col="${col}">
                                <span class="move_name">${transition.name}</span>
                            </span>
                        `;
                    }
                    
                    const special = grid.specialTransitions?.find(t => t.row === row && t.col === col);
                    if (special) {
                        html += `
                            <span class="move_parent" data-type="special" data-name="${special.name}" data-row="${row}" data-col="${col}">
                                <span class="move_name">${special.name}</span>
                            </span>
                        `;
                    }
                    
                    html += '</div>';
                    html += '</td>';
                }
                html += '</tr>';
            }
            
            fieldTable.innerHTML = html;
            
            document.querySelectorAll('.move_parent').forEach(parent => {
                parent.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    
                    if (meetingDialogActive || !gameActive || dialogActive || dialogJustFinished || dialogCooldown) return;
                    
                    playClickSound();
                    
                    const type = this.dataset.type;
                    const row = parseInt(this.dataset.row);
                    const col = parseInt(this.dataset.col);
                    
                    if (type === 'transition') {
                        const nextLocation = this.dataset.next;
                        const transitionName = this.querySelector('.move_name').textContent;
                        
                        if (meetingDialogShown && (transitionName === 'Горы' || transitionName === 'Пологий склон')) {
                            playerEscaped();
                            return;
                        }
                        
                        if (nextLocation && locations[nextLocation]) {
                            startPlayerMove(nextLocation, row, col);
                        }
                    } else if (type === 'special') {
                    }
                });
            });
        }
    
        cancelMoveBtn.addEventListener('click', () => {
            playClickSound();
            cancelPlayerMove();
        });
    
        tryAgainBtn.addEventListener('click', () => {
            location.reload();
        });
    
        document.addEventListener('click', function(e) {
            if (e.target.closest('.settings-panel') || e.target.closest('.settings-button')) return;
            if (e.target.closest('.move_parent')) return;
            if (e.target === cancelMoveBtn) return;
            if (e.target === tryAgainBtn) return;
            if (e.target.closest('.choice-btn')) return;
            
            if (waitingForChoice) return;
            
            if (dialogPanel.classList.contains('active') && dialogActive) {
                if (isPrinting) {
                    if (printTimer) clearTimeout(printTimer);
                    isPrinting = false;
                    printTimer = null;
                    
                    if (choiceComments.length > 0) {
                        dialogText.innerHTML = choiceComments[choiceCommentIndex];
                    } else if (meetingDialogShown && meetingDialogTexts) {
                        dialogText.innerHTML = meetingDialogTexts[meetingDialogIndex];
                    } else {
                        dialogText.innerHTML = currentDialogIsItalic ? '<i>' + currentText + '</i>' : currentText;
                    }
                    return;
                }
                
                if (choiceComments.length > 0) {
                    if (choiceCommentIndex < choiceComments.length - 1) {
                        choiceCommentIndex++;
                        printDialog(choiceComments[choiceCommentIndex], false);
                    } else {
                        choiceComments = [];
                        dialogPanel.classList.remove('active');
                        dialogActive = false;
                        
                        if (currentChoiceData && currentChoiceData.isCorrect) {
                            meetingDialogActive = false;
                            dialogCooldown = false;
                            
                            if (wasPlayerMoving && playerSavedTime > 0) {
                                playerTimeLeft = playerSavedTime;
                                cancelAvailable = true;
                                updateCancelButton();
                                
                                if (playerTimer) clearInterval(playerTimer);
                                playerTimer = setInterval(() => {
                                    if (!gameActive) return;
                                    playerTimeLeft--;
                                    updatePlayerTimer();
                                    if (playerTimeLeft <= 0) {
                                        completePlayerMove();
                                    }
                                }, 1000);
                            }
                            
                            if (wolverineActive) {
                                if (wasWolverineMoving && wolverineSavedTime > 0) {
                                    wolverineTimeLeft = wolverineSavedTime;
                                    wolverineMoving = true;
                                    if (wolverineTimer) clearInterval(wolverineTimer);
                                    wolverineTimer = setInterval(() => {
                                        if (!gameActive) return;
                                        wolverineTimeLeft--;
                                        if (wolverineTimeLeft <= 0) {
                                            completeWolverineMoveOnLocation();
                                        }
                                    }, 1000);
                                } else {
                                    wolverineMoving = false;
                                    wolverineTimeLeft = 0;
                                    if (wolverineTimer) {
                                        clearInterval(wolverineTimer);
                                        wolverineTimer = null;
                                    }
                                    
                                    setTimeout(() => {
                                        resumeWolverineMovement();
                                    }, 100);
                                }
                            } else {
                                renderGrid();
                            }
                        } else {
                            showChoicePanel();
                        }
                    }
                    return;
                }

                if (meetingDialogShown && meetingDialogTexts) {
                    if (meetingDialogIndex < meetingDialogTexts.length - 1) {
                        meetingDialogIndex++;
                        printDialog(meetingDialogTexts[meetingDialogIndex], false);
                    } else {
                        dialogPanel.classList.remove('active');
                        dialogActive = false;
                        showChoicePanel();
                    }
                    return;
                }
                
                const wasInitialDialog = initialDialogActive;
                initialDialogActive = false;
                
                dialogPanel.classList.remove('active');
                dialogActive = false;
                meetingDialogActive = false;
                dialogJustFinished = true;
                
                setTimeout(() => {
                    dialogCooldown = false;
                }, 1000);
                
                if (wasInitialDialog) {
                    setTimeout(() => {
                        dialogJustFinished = false;
                        if (!wolverineActive && gameActive) {
                            spawnWolverine();
                        }
                    }, 500);
                } else {
                    if (wasPlayerMoving && playerSavedTime > 0) {
                        playerTimeLeft = playerSavedTime;
                        cancelAvailable = true;
                        updateCancelButton();
                        
                        if (playerTimer) clearInterval(playerTimer);
                        playerTimer = setInterval(() => {
                            if (!gameActive || meetingDialogActive) return;
                            playerTimeLeft--;
                            updatePlayerTimer();
                            if (playerTimeLeft <= 0) {
                                completePlayerMove();
                            }
                        }, 1000);
                    }
                    
                    if (wasWolverineMoving && wolverineSavedTime > 0) {
                        wolverineTimeLeft = wolverineSavedTime;
                        if (wolverineTimer) clearInterval(wolverineTimer);
                        wolverineTimer = setInterval(() => {
                            if (!gameActive || meetingDialogActive) return;
                            wolverineTimeLeft--;
                            if (wolverineTimeLeft <= 0) {
                                completeWolverineMoveOnLocation();
                            }
                        }, 1000);
                    }
                    
                    setTimeout(() => {
                        dialogJustFinished = false;
                    }, 500);
                }
            }
        });
    </script>
